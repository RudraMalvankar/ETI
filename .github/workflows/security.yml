name: APEX Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: "0 2 * * *"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Secret Scanning with TruffleHog
  # ─────────────────────────────────────────────────────────────────
  secret-scanning:
    name: "Secret Scanning"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: TruffleHog OSS Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # Python Dependency Vulnerability Scan
  # ─────────────────────────────────────────────────────────────────
  pip-audit:
    name: "Python: pip-audit CVE Scan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit production dependencies
        run: |
          pip-audit -r requirements.txt \
            --format=json \
            --output=pip-audit-results.json \
            --ignore-vuln PYSEC-2022-42974
        continue-on-error: true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: backend/pip-audit-results.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────
  # Safety Check
  # ─────────────────────────────────────────────────────────────────
  safety-check:
    name: "Python: Safety CVE Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install safety
        run: pip install safety

      - name: Run Safety check
        run: safety check -r requirements.txt --json > safety-results.json
        continue-on-error: true

      - name: Upload Safety results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-results
          path: backend/safety-results.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────
  # SAST — Static Application Security Testing
  # ─────────────────────────────────────────────────────────────────
  sast-bandit:
    name: "SAST: Bandit Python Security Scan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-results.json \
            --severity-level medium \
            --confidence-level medium
        continue-on-error: true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-sast-results
          path: backend/bandit-results.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────
  # Node.js Dependency Audit
  # ─────────────────────────────────────────────────────────────────
  npm-audit:
    name: "Frontend: npm audit"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high --json > npm-audit-results.json
        continue-on-error: true

      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-results
          path: frontend/npm-audit-results.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────
  # Security Summary
  # ─────────────────────────────────────────────────────────────────
  security-summary:
    name: "Security Summary"
    runs-on: ubuntu-latest
    needs: [secret-scanning, pip-audit, safety-check, sast-bandit, npm-audit]
    if: always()

    steps:
      - name: Security Scan Summary
        run: |
          echo "========================================"
          echo "APEX SECURITY SCAN SUMMARY"
          echo "========================================"
          echo "Secret Scanning:  ${{ needs.secret-scanning.result }}"
          echo "pip-audit:        ${{ needs.pip-audit.result }}"
          echo "Safety Check:     ${{ needs.safety-check.result }}"
          echo "Bandit SAST:      ${{ needs.sast-bandit.result }}"
          echo "npm audit:        ${{ needs.npm-audit.result }}"
          echo "========================================"
          echo "All scans complete. Review artifacts for details."
