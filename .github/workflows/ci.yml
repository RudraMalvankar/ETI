name: APEX CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feature/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Backend Lint & Static Analysis
  # ─────────────────────────────────────────────────────────────────
  backend-lint:
    name: "Backend: Lint & Static Analysis"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Black (formatting check)
        run: black --check --diff .

      - name: Run isort (import sort check)
        run: isort --check-only --diff .

      - name: Run Ruff (linting)
        run: ruff check .

      - name: Run Mypy (type checking)
        run: mypy app/
        continue-on-error: true  # Non-blocking until codebase is fully typed

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Backend Tests with Coverage
  # ─────────────────────────────────────────────────────────────────
  backend-tests:
    name: "Backend: Tests & Coverage"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: ./backend

    env:
      JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
      JWT_SECRET: "ci-test-secret-key-not-for-production"
      ENVIRONMENT: "development"
      AI_PROVIDER: "mock"
      DATABASE_URL: "sqlite:///./test_apex.db"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Pytest with Coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short \
            --ignore=tests/benchmarks \
            -x

      - name: Upload Coverage Report to Codecov
        uses: codecov/codecov-action@v7
        if: always()
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: apex-backend-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/coverage.xml
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Frontend Build & Tests
  # ─────────────────────────────────────────────────────────────────
  frontend-build:
    name: "Frontend: Build & Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 50
        continue-on-error: true

      - name: Run Prettier Check
        run: npx prettier --check "src/**/*.{ts,tsx,css}"
        continue-on-error: true

      - name: TypeScript Type Check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Frontend
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Docker Build Verification
  # ─────────────────────────────────────────────────────────────────
  docker-build:
    name: "Docker: Build Verification"
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: apex-backend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: apex-frontend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # JOB 5: Security Dependency Audit
  # ─────────────────────────────────────────────────────────────────
  security-audit:
    name: "Security: Dependency Audit"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install pip-audit safety

      - name: Run pip-audit (CVE scan)
        run: pip-audit -r requirements.txt --format=markdown --output=pip-audit-report.md
        continue-on-error: true

      - name: Run Safety check
        run: safety check -r requirements.txt --json > safety-report.json
        continue-on-error: true

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            backend/pip-audit-report.md
            backend/safety-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # JOB 6: Performance Benchmarks (on PR only)
  # ─────────────────────────────────────────────────────────────────
  benchmarks:
    name: "Performance: Benchmarks"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: backend-tests
    defaults:
      run:
        working-directory: ./backend

    env:
      JWT_SECRET_KEY: "ci-benchmark-secret-key"
      JWT_SECRET: "ci-benchmark-secret-key"
      ENVIRONMENT: "development"
      AI_PROVIDER: "mock"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Benchmarks
        run: |
          pytest tests/benchmarks/ -v --tb=short -s 2>&1 | tee benchmark-report.txt
        continue-on-error: true

      - name: Upload Benchmark Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-report
          path: backend/benchmark-report.txt
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────
  # JOB 7: Production Readiness Summary
  # ─────────────────────────────────────────────────────────────────
  production-readiness:
    name: "Final: Production Readiness Gate"
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, docker-build, security-audit]
    if: always()

    steps:
      - name: Check all required jobs passed
        run: |
          echo "============================================"
          echo "APEX PRODUCTION READINESS GATE"
          echo "============================================"
          echo "Backend Tests:    ${{ needs.backend-tests.result }}"
          echo "Frontend Build:   ${{ needs.frontend-build.result }}"
          echo "Docker Build:     ${{ needs.docker-build.result }}"
          echo "Security Audit:   ${{ needs.security-audit.result }}"
          echo "============================================"

          if [[ "${{ needs.backend-tests.result }}" == "failure" ]]; then
            echo "❌ Backend tests failed — blocking merge"
            exit 1
          fi
          if [[ "${{ needs.frontend-build.result }}" == "failure" ]]; then
            echo "❌ Frontend build failed — blocking merge"
            exit 1
          fi
          if [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "❌ Docker build failed — blocking merge"
            exit 1
          fi
          echo "✅ All critical checks passed — ready for merge"
